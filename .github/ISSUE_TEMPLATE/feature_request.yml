name: Feature request
description: an idea for a new tool, provider, or trick
title: "[feat]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: idea
    attributes:
      label: the idea
      description: what would you like the agent to be able to do?
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: why it would be useful
  - type: dropdown
    id: area
    attributes:
      label: area
      options:
        - new tool
        - new llm provider
        - rag / retrieval
        - cli / ux
        - server / api
        - other
