name: Bug report
description: something is broken or acting weird
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: thanks for taking the time to file this. a few details go a long way.
  - type: textarea
    id: what-happened
    attributes:
      label: what happened
      description: what did you do, and what went wrong?
      placeholder: i ran `aiagent research "..."` and it blew up with ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: what you expected
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: provider / model
      placeholder: openai / gpt-4o
  - type: input
    id: python
    attributes:
      label: python version
      placeholder: "3.11"
  - type: textarea
    id: logs
    attributes:
      label: logs or traceback
      render: shell
