name: Greetings

on: [pull_request_target, issues]

permissions:
  issues: write
  pull-requests: write

jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            hey, thanks for opening your first issue here. this is a hobby project so replies
            might not be instant, but i appreciate you taking the time.
          pr-message: >
            thanks for your first PR. give the checklist a look, make sure the tests pass,
            and i will get to it when i can. appreciate you.
