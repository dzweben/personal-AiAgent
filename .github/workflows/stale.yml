name: Stale

on:
  schedule:
    - cron: "0 9 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-stale: 45
          days-before-close: 14
          stale-issue-message: >
            this issue has been quiet for a while, so i am marking it stale. drop a comment
            if it is still relevant, otherwise it will close itself in a couple of weeks.
          stale-pr-message: >
            heads up, this PR has gone quiet. give it a nudge if it is still alive.
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned,wip"
