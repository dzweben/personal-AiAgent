name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "27 4 * * 1"

jobs:
  analyze:
    name: analyze python
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: init codeql
        uses: github/codeql-action/init@v4
        with:
          languages: python

      - name: autobuild
        uses: github/codeql-action/autobuild@v4

      - name: analyze
        uses: github/codeql-action/analyze@v4
